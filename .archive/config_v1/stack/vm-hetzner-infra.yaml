apiVersion: strata.huybrechts.xyz/v1
kind: resource
meta:
  name: haven_vm_hetzner_infra
  annotations:
    description: Hetzner Infrastructure VM — databases and infrastructure services (Postgres, Redis, GlusterFS)
  labels:
    version: 1.0.0
  tags: [haven, hetzner, vm, infra]
spec:
  properties:
    provider_type: hetzner
    resource_type: virtualmachine
    unit_cost: 5.00 # USD per month (cx22)
  configuration:
    image: ubuntu-24.04
    server_type: cx22
    location: nbg1
  storage:
    install_path: /opt/install/haven
    disks:
      - size: 20
        label: haven-vm-infra-os
        mount: /mnt/data1
      - size: 40
        label: haven-vm-infra-data
        mount: /mnt/data2
    volumes:
      - name: config
        path: /mnt/data2/etc/haven
      - name: docs
        path: /mnt/data2/var/docs/haven
      - name: data
        path: /mnt/data2/var/data/haven
      - name: logs
        path: /mnt/data2/var/logs/haven
      - name: serve
        path: /mnt/data2/var/serve
