apiVersion: strata.huybrechts.xyz/v1
kind: resource
meta:
  name: haven_vm_kamatera_infra
  annotations:
    description: Kamatera Infrastructure VM — databases and infrastructure services (Postgres, Redis, GlusterFS)
  labels:
    version: 1.0.0
  tags: [haven, kamatera, vm, infra]
spec:
  properties:
    provider_type: kamatera
    resource_type: virtualmachine
    unit_cost: 11.00 # USD per month
  configuration:
    os_name: "Ubuntu"
    os_code: "24.04 64bit"
    cpu_type: "A"
    cpu_cores: 1
    ram_mb: 4096
    billing: "hourly"
    disk_size: 40
  storage:
    install_path: /opt/install/haven
    disks:
      - size: 20
        label: haven-vm-infra-os
        mount: /mnt/data1
      - size: 40
        label: haven-vm-infra-data
        mount: /mnt/data2
    volumes:
      - name: config
        path: /mnt/data2/etc/haven
      - name: docs
        path: /mnt/data2/var/docs/haven
      - name: data
        path: /mnt/data2/var/data/haven
      - name: logs
        path: /mnt/data2/var/logs/haven
      - name: serve
        path: /mnt/data2/var/serve
