apiVersion: strata.huybrechts.xyz/v1
kind: workspace
meta:
  name: haven_hetzner_platform
  annotations:
    description: Haven platform workspace on Hetzner — Docker Swarm cluster
  labels:
    version: "1.0.0"
  tags: [haven, hetzner, platform]
spec:
  providers:
    - name: hetzner_eu_de
      file: "stack/dc-hetzner-eu-de.yaml"

  provisioners:
    - name: haven_iac
      provisioner: terraform
      source:
        repository: haven
        source_path: terraform

  topology:
    - name: haven_swarm
      provider: hetzner_eu_de
      provisioner: terraform
      type: docker_swarm
      volumes:
        - name: config
          type: replicated
        - name: docs
          type: replicated
        - name: data
          type: local
        - name: logs
          type: local
        - name: serve
          type: distributed
      components:
        - resource: haven_vm_hetzner_manager
        - resource: haven_vm_hetzner_infra
        - resource: haven_vm_hetzner_worker

  resources:
    - name: haven_vm_hetzner_manager
      file: "stack/vm-hetzner-manager.yaml"
      role: manager
      count: 1
      firewalls:
        - haven_fw_vm
    - name: haven_vm_hetzner_infra
      file: "stack/vm-hetzner-infra.yaml"
      role: worker
      count: 1
      firewalls:
        - haven_fw_vm
    - name: haven_vm_hetzner_worker
      file: "stack/vm-hetzner-worker.yaml"
      role: worker
      count: 2
      firewalls:
        - haven_fw_vm

  # namespaces:
  #   - name: haven_ns_base
  #     file: "stack/ns-base.yaml"

  firewalls:
    - name: haven_fw_vm
      file: "stack/fw-vm.yaml"
