apiVersion: strata.huybrechts.xyz/v1
kind: environment
meta:
  name: haven_env_hetzner_prd
  annotations:
    description: Production environment for the Haven platform on Hetzner
  labels:
    version: "1.0.0"
  tags: [haven, hetzner, production]
spec:
  variables:
    - key: WORKSPACE
      store: constant
      value: haven
    - key: DATACENTER
      store: constant
      value: hetzner-eu-de
  secrets:
    # Credentials for Terraform
    - key: TERRAFORM_API_TOKEN
      store: bitwarden
      value: ~
    # Credentials for Hetzner
    - key: HETZNER_API_TOKEN
      store: bitwarden
      value: ~
    # SSH Keys and Root Passwords
    - key: HETZNER_PRIVATE_KEY
      store: bitwarden
      value: ~
    - key: HETZNER_PUBLIC_KEY
      store: bitwarden
      value: ~
    - key: HETZNER_ROOT_PASSWORD
      store: bitwarden
      value: ~
