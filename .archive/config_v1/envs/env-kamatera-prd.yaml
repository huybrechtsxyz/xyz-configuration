apiVersion: strata.huybrechts.xyz/v1
kind: environment
meta:
  name: haven_env_kamatera_prd
  annotations:
    description: Production environment for the Haven platform on Kamatera
  labels:
    version: "1.0.0"
  tags: [haven, kamatera, production]
spec:
  variables:
    - key: WORKSPACE
      store: constant
      value: haven
    - key: DATACENTER
      store: constant
      value: kamatera-eu-fr
  secrets:
    # Credentials for Terraform
    - key: TERRAFORM_API_TOKEN
      store: bitwarden
      value: d47e736b-2db8-47d5-b46b-b2c8016ece73
    # Credentials for Kamatera
    - key: KAMATERA_API_KEY
      store: bitwarden
      value: 357068b9-9f5f-4f79-940c-b2c8016cb88f
    - key: KAMATERA_API_SECRET
      store: bitwarden
      value: 6c9295a8-9fa4-4d38-8929-b2c8016d9b43
    # SSH Keys and Root Passwords
    - key: KAMATERA_PRIVATE_KEY
      store: bitwarden
      value: f16fffe2-77b7-4d20-bf6c-b2c9015c71d3
    - key: KAMATERA_PUBLIC_KEY
      store: bitwarden
      value: 6cc5b975-56a9-4d7a-80c7-b2c90151cce0
    - key: KAMATERA_ROOT_PASSWORD
      store: bitwarden
      value: 5083ae32-429d-428b-b7df-b2c901441bbb
