apiVersion: strata.huybrechts.xyz/v1
kind: deployment
meta:
  name: haven_deploy_hetzner_prd
  annotations:
    description: Production deployment for the Haven platform on Hetzner
  labels:
    version: "1.0.0"
  tags: [haven, hetzner, production, deployment]
spec:
  configurations:
    - name: config
      file: config/config.yaml

  lifecycle: null

  layers:
    environment: prd

  properties:
    environment: prd

  workspace:
    name: haven_hetzner_platform
    description: Haven Hetzner Platform Workspace
    file: "stack/ws-hetzner-platform.yaml"

  environments:
    - "envs/env-hetzner-prd.yaml"

  stages:
    # Infrastructure provisioning stage - uses Terraform via convention
    - name: infrastructure
      type: infrastructure
      scope: all
      depends_on: null
      on_failure: stop
