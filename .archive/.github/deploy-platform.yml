# ==============================================================================
# Workflow Name : Deploy - Platform
# File Name     : deploy-platform.yml
# Description   :
#   Deploys the Haven platform workspace using strata CLI.
#   Builds artifacts then runs Terraform init/validate/plan/apply.
#
# Author        : Vincent Huybrechts
# Created       : 2026-05-18
# Last Updated  : 2026-05-18
# Version       : 1.0.0
#
# Triggers      :
#   - [ ] push
#   - [ ] pull_request
#   - [ ] schedule
#   - [x] workflow_dispatch
#
# Environment   :
#   - OS        : ubuntu-latest
#   - Language  : bash / python 3.13
#
# Secrets       :
#   - BITWARDEN_TOKEN : Bitwarden Secrets Manager access token
# ==============================================================================

name: Deploy - Platform

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (plan only, no apply)"
        type: boolean
        default: false
      stage:
        description: "Limit to a specific stage (empty = all)"
        type: string
        required: false

permissions:
  contents: read

env:
  STRATA_OUTPUT: json
  STRATA_WORK_PATH: ${{ github.workspace }}
  DEPLOYMENT_FILE: "@haven/deploy/deploy-prd.yaml"

jobs:
  deploy_platform:
    name: Deploy Platform
    runs-on: ubuntu-latest
    environment: production

    steps:
      # ------------------------------------------------------------------
      # Checkout
      # ------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # Install tools
      # ------------------------------------------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install strata
        run: pip install xyz-strata

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      # ------------------------------------------------------------------
      # Secrets — Bitwarden Secrets Manager
      # ------------------------------------------------------------------
      - name: Fetch Secrets
        id: secrets
        uses: bitwarden/sm-action@v3
        with:
          access_token: ${{ secrets.BITWARDEN_TOKEN }}
          secrets: |
            f16fffe2-77b7-4d20-bf6c-b2c9015c71d3 > KAMATERA_PRIVATE_KEY
            <secret-id> > KAMATERA_PUBLIC_KEY
            <secret-id> > KAMATERA_API_KEY
            <secret-id> > KAMATERA_API_SECRET
            <secret-id> > KAMATERA_ROOT_PASSWORD
            <secret-id> > TERRAFORM_API_TOKEN

      - name: Export Secrets as TF_VAR
        env:
          KAMATERA_PRIVATE_KEY: ${{ steps.secrets.outputs.KAMATERA_PRIVATE_KEY }}
          KAMATERA_PUBLIC_KEY: ${{ steps.secrets.outputs.KAMATERA_PUBLIC_KEY }}
          KAMATERA_API_KEY: ${{ steps.secrets.outputs.KAMATERA_API_KEY }}
          KAMATERA_API_SECRET: ${{ steps.secrets.outputs.KAMATERA_API_SECRET }}
          KAMATERA_ROOT_PASSWORD: ${{ steps.secrets.outputs.KAMATERA_ROOT_PASSWORD }}
          TERRAFORM_API_TOKEN: ${{ steps.secrets.outputs.TERRAFORM_API_TOKEN }}
        run: |
          # Mask all values
          echo "::add-mask::${KAMATERA_PRIVATE_KEY}"
          echo "::add-mask::${KAMATERA_PUBLIC_KEY}"
          echo "::add-mask::${KAMATERA_API_KEY}"
          echo "::add-mask::${KAMATERA_API_SECRET}"
          echo "::add-mask::${KAMATERA_ROOT_PASSWORD}"
          echo "::add-mask::${TERRAFORM_API_TOKEN}"

          # Export as TF_VAR_ for Terraform consumption
          echo "TF_VAR_KAMATERA_PRIVATE_KEY=${KAMATERA_PRIVATE_KEY}" >> $GITHUB_ENV
          echo "TF_VAR_KAMATERA_PUBLIC_KEY=${KAMATERA_PUBLIC_KEY}" >> $GITHUB_ENV
          echo "TF_VAR_KAMATERA_API_KEY=${KAMATERA_API_KEY}" >> $GITHUB_ENV
          echo "TF_VAR_KAMATERA_API_SECRET=${KAMATERA_API_SECRET}" >> $GITHUB_ENV
          echo "TF_VAR_KAMATERA_ROOT_PASSWORD=${KAMATERA_ROOT_PASSWORD}" >> $GITHUB_ENV
          echo "TF_VAR_TERRAFORM_API_TOKEN=${TERRAFORM_API_TOKEN}" >> $GITHUB_ENV

      # ------------------------------------------------------------------
      # Validate
      # ------------------------------------------------------------------
      - name: Validate deployment file
        run: |
          strata validate $DEPLOYMENT_FILE --deep

      # ------------------------------------------------------------------
      # Build
      # ------------------------------------------------------------------
      - name: Build platform artifacts
        run: |
          strata build run --file $DEPLOYMENT_FILE

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: platform-build
          path: .platform/build/
          retention-days: 14

      # ------------------------------------------------------------------
      # Deploy
      # ------------------------------------------------------------------
      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: platform-build
          path: .platform/build/

      - name: Deploy infrastructure
        run: |
          ARGS="--file $DEPLOYMENT_FILE --force"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "${{ inputs.stage }}" ]; then
            ARGS="$ARGS --stage ${{ inputs.stage }}"
          fi
          strata deploy run $ARGS
