apiVersion: strata.huybrechts.xyz/v1
kind: environment
meta:
  name: haven_env_family_prd
  annotations:
    description: Production environment for the family platform on Hetzner
  labels:
    version: "1.0.0"
  tags: [haven, hetzner, family, production]
spec:
  variables:
    - key: WORKSPACE
      store: constant
      value: haven
    - key: DATACENTER
      store: constant
      value: hetzner-eu-de
    - key: ENVIRONMENT
      store: constant
      value: prd
    # Domains
    - key: DOMAIN_PRIMARY
      store: constant
      value: huybrechts.xyz
    - key: DOMAIN_ALIAS_DEV
      store: constant
      value: huybrechts.dev
    - key: DOMAIN_ALIAS_ALDERWYN
      store: constant
      value: alderwyn.xyz
    - key: DOMAIN_ALIAS_JANA
      store: constant
      value: madebyjana.be
    # Subdomains (resolve to Core VPS IP)
    - key: SUBDOMAIN_AUTH
      store: constant
      value: auth.huybrechts.xyz
    - key: SUBDOMAIN_VAULT
      store: constant
      value: vault.huybrechts.xyz
    - key: SUBDOMAIN_SECRETS
      store: constant
      value: secrets.huybrechts.xyz
    - key: SUBDOMAIN_PHOTOS
      store: constant
      value: photos.huybrechts.xyz
    - key: SUBDOMAIN_STATUS
      store: constant
      value: status.huybrechts.xyz
    # Infrastructure
    - key: HETZNER_REGION
      store: constant
      value: eu-de
    - key: HETZNER_LOCATION
      store: constant
      value: nbg1
    - key: CORE_VM_TYPE
      store: constant
      value: cx22
    - key: WORKLOAD_VM_TYPE
      store: constant
      value: cpx41
    - key: STORAGE_BOX_TYPE
      store: constant
      value: bx11
  secrets:
    # Bootstrap secrets — loaded from GitHub Secrets on first deploy only
    # After Core VPS is running, all runtime secrets are pulled from Infisical
    - key: HETZNER_API_TOKEN
      store: github
      value: ~ # GitHub Secret: HETZNER_API_TOKEN
    - key: HETZNER_PRIVATE_KEY
      store: github
      value: ~ # GitHub Secret: HETZNER_PRIVATE_KEY
    - key: HETZNER_PUBLIC_KEY
      store: github
      value: ~ # GitHub Secret: HETZNER_PUBLIC_KEY
    - key: HETZNER_ROOT_PASSWORD
      store: github
      value: ~ # GitHub Secret: HETZNER_ROOT_PASSWORD
    # Workload VPS — Infisical ESO token only (no other secrets)
    - key: INFISICAL_ESO_TOKEN
      store: github
      value: ~ # GitHub Secret: INFISICAL_ESO_TOKEN (scoped to workload namespace)
