apiVersion: strata.huybrechts.xyz/v1
kind: workspace
meta:
  name: haven_family_platform
  annotations:
    description: Family platform workspace — Hearth VPS (Docker Compose) + Forge VPS (k3s) on Hetzner
  labels:
    version: "1.0.0"
  tags: [haven, hetzner, platform, family]
spec:
  providers:
    - name: hetzner_dc_eu_de
      file: "stack/dc-hetzner-eu-de.yaml"

  provisioners:
    - name: haven_iac
      provisioner: terraform
      source:
        repository: haven
        source_path: terraform

  topology:
    - name: hetzner_hearth
      provider: hetzner_dc_eu_de
      provisioner: terraform
      type: single_node # Docker Compose — Caddy, Authentik, Vaultwarden, Infisical
      volumes:
        - name: config
          type: local
        - name: data
          type: local
        - name: logs
          type: local
        - name: certs
          type: local
      components:
        - resource: haven_vm_hetzner_hearth

    - name: hetzner_forge
      provider: hetzner_dc_eu_de
      provisioner: terraform
      type: k3s_single # k3s single-node — Immich, Gatus, apps
      volumes:
        - name: immich-library
          type: local
        - name: k3s-data
          type: local
        - name: logs
          type: local
      components:
        - resource: haven_vm_hetzner_forge

  resources:
    - name: haven_vm_hetzner_hearth
      file: "stack/vm-hetzner-hearth.yaml"
      role: hearth
      count: 1
      firewalls:
        - haven_fw_hetzner_hearth

    - name: haven_vm_hetzner_forge
      file: "stack/vm-hetzner-forge.yaml"
      role: forge
      count: 1
      firewalls:
        - haven_fw_hetzner_forge

    - name: haven_sb_hetzner_hearth
      file: "stack/sb-hetzner-hearth.yaml"
      role: backup
      count: 1

  firewalls:
    - name: haven_fw_hetzner_hearth
      file: "stack/fw-hetzner-hearth.yaml"

    - name: haven_fw_hetzner_forge
      file: "stack/fw-hetzner-forge.yaml"
