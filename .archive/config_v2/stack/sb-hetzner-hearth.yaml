apiVersion: strata.huybrechts.xyz/v1
kind: resource
meta:
  name: haven_sb_hetzner_hearth
  annotations:
    description: Hetzner BX11 Storage Box — encrypted BorgBackup target for Hearth and Forge VPS
  labels:
    version: "1.0.0"
  tags: [haven, hetzner, storagebox, hearth, family]
spec:
  lifecycle: null
  properties:
    provider_type: hetzner
    resource_type: storagebox
    unit_cost: 3.81 # EUR per month (BX11, 1 TB)
  configuration:
    type: bx11
    location: nbg1 # same region as VPS nodes
  access:
    protocol: ssh # BorgBackup over SSH
    sub_accounts:
      - name: hearth_backup
        comment: BorgBackup sub-account for Hearth VPS
      - name: forge_backup
        comment: BorgBackup sub-account for Forge VPS
