apiVersion: strata.huybrechts.xyz/v1
kind: firewall
meta:
  name: haven_fw_hetzner_forge
  annotations:
    description: Firewall for Forge VPS — proxied via Hearth Caddy; SSH and k3s API private only
  labels:
    version: "1.0.0"
  tags: [haven, firewall, forge, family]
spec:
  reset: true
  defaults:
    - direction: in
      permission: deny
      comment: Deny all incoming traffic by default
    - direction: out
      permission: deny
      comment: Deny all outgoing traffic by default
  deny:
  allow:
    # Essential system services
    - direction: out
      proto: udp
      port: 53
      comment: DNS (UDP)
    - direction: out
      proto: tcp
      port: 53
      comment: DNS (TCP)
    - direction: out
      proto: udp
      port: 123
      comment: NTP
    - direction: in
      interface: lo
      comment: Loopback IN
    - direction: out
      interface: lo
      comment: Loopback OUT
    # Package management and image pulls
    - direction: out
      proto: tcp
      port: [20, 21]
      comment: FTP (apt)
    - direction: out
      proto: tcp
      port: 11371
      comment: GPG keyserver
    - direction: out
      proto: tcp
      port: 80
      comment: HTTP outbound (image pulls)
    - direction: out
      proto: tcp
      port: 443
      comment: HTTPS outbound
    # Inbound only from Core VPS (Caddy reverse proxy)
    - direction: in
      proto: tcp
      port: 80
      from: 10.0.0.0/8
      comment: HTTP from Core Caddy proxy
    - direction: in
      proto: tcp
      port: 443
      from: 10.0.0.0/8
      comment: HTTPS from Core Caddy proxy
    # SSH — private network only
    - direction: in
      proto: tcp
      port: 22
      from: 10.0.0.0/8
      comment: SSH (private network only)
    # k3s API server — private network only (kubectl / strata)
    - direction: in
      proto: tcp
      port: 6443
      from: 10.0.0.0/8
      comment: k3s API server (private only)
