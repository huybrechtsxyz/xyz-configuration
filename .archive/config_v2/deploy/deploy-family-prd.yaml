apiVersion: strata.huybrechts.xyz/v1
kind: deployment
meta:
  name: haven_deploy_family_prd
  annotations:
    description: Production deployment for the family platform on Hetzner — Hearth + Forge
  labels:
    version: "1.0.0"
  tags: [haven, hetzner, family, production, deployment]
spec:
  configurations:
    - name: config
      file: config/config.yaml

  lifecycle: null

  layers:
    environment: prd

  properties:
    environment: prd

  workspace:
    name: haven_family_platform
    description: Haven Family Platform Workspace
    file: "stack/ws-family-platform.yaml"

  environments:
    - "envs/env-family-prd.yaml"

  stages:
    # Stage 1 — provision both VPS nodes and storage box via Terraform
    - name: infrastructure
      type: infrastructure
      scope: all
      depends_on: null
      on_failure: stop

    # Stage 2 — configure Hearth VPS: Docker Compose bootstrap (Caddy, Authentik, Vaultwarden, Infisical)
    - name: hearth_bootstrap
      type: configuration
      scope: hetzner_hearth
      depends_on: infrastructure
      on_failure: stop

    # Stage 3 — configure Forge VPS: k3s install + Helm deployments (Immich, Gatus, apps)
    # Uses Infisical ESO token only — no direct access to Hetzner or SSH keys
    - name: forge_deploy
      type: configuration
      scope: hetzner_forge
      depends_on: hearth_bootstrap
      on_failure: stop
