apiVersion: platform.huybrechts.xyz/v1
kind: configuration
meta:
  name: haven_config
  annotations:
    description: Kamatera-based platform configuration for Haven Docker Swarm
  labels:
    version: 1.0.0
  tags:
  - haven
  - configuration
spec:
  logging:
    file: '@haven/config/logging.yaml'
  layering:
  - name: environment
    description: Deployment environment
    pattern: ''
    required: true
  deployment:
    additional_properties: false
    properties:
      environment:
        pattern: ^(edge|prd)$
        required: true
        description: Deployment environment (edge, prd)
  repositories:
  - name: haven_config
    type: gitops
    repository: git@github.com:huybrechtsxzy/xyz-configuration.git
    reference: main
    source_path: .
    deploy_path: .
  integrations:
  - name: git
    type: git
    capabilities:
    - repository
    description: Git version control system for repository management
    required: true
    validation:
      command: git --version
      min_version: 2.30.0
    authentication:
      method: cli
      env_vars:
      - GIT_SSH_COMMAND
      - GIT_USERNAME
      - GIT_PASSWORD
  - name: terraform
    type: terraform
    capabilities:
    - infrastructure
    description: Terraform infrastructure as code provisioner
    required: true
    validation:
      command: terraform version
      min_version: 1.0.0
    authentication:
      method: cli
      env_vars:
      - TERRAFORM_API_TOKEN
  - name: bitwarden
    type: bitwarden
    capabilities:
    - secrets
    description: Bitwarden Secrets Manager
    required: false
    validation:
      command: bws --version
      min_version: 0.3.0
    endpoints:
      address: https://bitwarden.com/api
    authentication:
      method: api_key
      env_vars:
      - BWS_ACCESS_TOKEN
  providers:
  - name: kamatera
    description: Kamatera Cloud Provider
    additional_regions: false
    regions:
    - name: eu-fr
      description: Europe - Frankfurt
    additional_resources: false
    resources:
    - name: virtualmachine
      category: compute
      subcategory: virtualmachine
      description: Virtual Machine Resource
      additional_configurations: false
      configuration:
        os_name:
          pattern: ^[A-Za-z0-9_\-]{2,32}$
          required: true
          description: Operating system name (alphanumeric, underscores, hyphens,
            2-32 chars)
        os_code:
          pattern: ^[A-Za-z0-9.\- ]{2,32}$
          required: true
          description: Operating system version code
        cpu_type:
          pattern: ^(A|B|P|T)$
          required: true
          description: 'CPU type: A (Availability), B (Balanced), P (Performance),
            T (Turbo)'
        cpu_cores:
          pattern: ^[1-9][0-9]?$
          required: true
          description: Number of CPU cores (1-99)
        ram_mb:
          pattern: ^(512|1024|2048|4096|8192|16384|32768)$
          required: true
          description: RAM in MB
        billing:
          pattern: ^(hourly|monthly)$
          required: true
          description: Billing frequency
        disk_size:
          pattern: ^[1-9][0-9]*$
          required: false
          description: Optional custom disk size in GB
  additional_topologies: false
  topologies:
  - type: docker_swarm
    description: Docker Swarm Cluster Topology
    additional_components: false
    components:
    - role: manager
      description: Docker Swarm Manager Node
      uses_module: false
      is_control: true
      required: true
      min_count: 1
      max_count: 5
    - role: worker
      description: Docker Swarm Worker Node
      uses_module: false
      is_control: false
      required: true
      min_count: 1
      max_count: 5
