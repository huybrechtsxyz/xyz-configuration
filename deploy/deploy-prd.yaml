apiVersion: platform.huybrechts.xyz/v1
kind: deployment
meta:
  name: haven_deploy_prd
  annotations:
    description: Production deployment for the Haven platform on Kamatera
  labels:
    version: "1.0.0"
  tags: [haven, production, deployment]
spec:
  configurations: null

  lifecycle: null

  layers:
    environment: prd

  properties:
    environment: prd

  workspace:
    name: haven_platform
    description: Haven Platform Workspace
    file: "stack/ws-platform.yaml"

  environments:
    - "envs/env-prd.yaml"

  stages:
    # Infrastructure provisioning stage - uses Terraform via convention
    - name: infrastructure
      type: infrastructure
      scope: all
      depends_on: null
      on_failure: stop
