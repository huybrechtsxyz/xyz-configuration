# ==============================================================================
# Workflow Template: Deploy Workspace
# Generated by: strata new pipeline ${name}
#
# Description:
#   Deploys a platform workspace using strata CLI.
#   Runs build + deploy pipeline with secret injection.
#
# Secret Managers Supported:
#   - bitwarden  : Bitwarden Secrets Manager (bitwarden/sm-action)
#   - azure      : Azure Key Vault (azure/login + az keyvault)
#   - github     : GitHub Secrets (no action needed, use secrets.*)
#   - vault      : HashiCorp Vault (hashicorp/vault-action)
#
# Usage:
#   strata new pipeline <name> --set file=@repo/deploy/deploy-env.yaml
#                           --set secret_manager=bitwarden
#                           --set environment=production
# ==============================================================================

name: Deploy - ${name}

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (plan only, no apply)"
        type: boolean
        default: false
      stage:
        description: "Limit to a specific stage (empty = all)"
        type: string
        required: false

permissions:
  contents: read

env:
  STRATA_OUTPUT: json
  STRATA_WORK_PATH: $${{ github.workspace }}
  DEPLOYMENT_FILE: "${file}"

jobs:
  deploy:
    name: Deploy ${name}
    runs-on: ubuntu-latest
    environment: ${environment}

    steps:
      # ------------------------------------------------------------------
      # Checkout
      # ------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # Install tools
      # ------------------------------------------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install strata
        run: pip install xyz-strata

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      # ------------------------------------------------------------------
      # Secrets — Bitwarden
      # Uncomment and configure for your secret manager
      # ------------------------------------------------------------------
      # [bitwarden]
      # - name: Fetch Secrets (Bitwarden)
      #   id: secrets
      #   uses: bitwarden/sm-action@v3
      #   with:
      #     access_token: $${{ secrets.BITWARDEN_TOKEN }}
      #     secrets: |
      #       <secret-id-terraform-token> > TERRAFORM_API_TOKEN
      #       <secret-id-kamatera-key> > KAMATERA_API_KEY
      #       <secret-id-kamatera-secret> > KAMATERA_API_SECRET
      #       <secret-id-kamatera-private-key> > KAMATERA_PRIVATE_KEY
      #       <secret-id-kamatera-public-key> > KAMATERA_PUBLIC_KEY
      #       <secret-id-kamatera-password> > KAMATERA_ROOT_PASSWORD

      # ------------------------------------------------------------------
      # Secrets — Azure Key Vault
      # ------------------------------------------------------------------
      # [azure]
      # - name: Azure Login
      #   uses: azure/login@v2
      #   with:
      #     creds: $${{ secrets.AZURE_CREDENTIALS }}
      #
      # - name: Fetch Secrets (Azure Key Vault)
      #   run: |
      #     echo "TF_VAR_TERRAFORM_API_TOKEN=$(az keyvault secret show --vault-name <vault> --name terraform-token --query value -o tsv)" >> $GITHUB_ENV
      #     echo "TF_VAR_KAMATERA_API_KEY=$(az keyvault secret show --vault-name <vault> --name kamatera-api-key --query value -o tsv)" >> $GITHUB_ENV
      #     echo "TF_VAR_KAMATERA_API_SECRET=$(az keyvault secret show --vault-name <vault> --name kamatera-api-secret --query value -o tsv)" >> $GITHUB_ENV

      # ------------------------------------------------------------------
      # Secrets — HashiCorp Vault
      # ------------------------------------------------------------------
      # [vault]
      # - name: Fetch Secrets (Vault)
      #   uses: hashicorp/vault-action@v3
      #   with:
      #     url: https://vault.example.com
      #     method: approle
      #     roleId: $${{ secrets.VAULT_ROLE_ID }}
      #     secretId: $${{ secrets.VAULT_SECRET_ID }}
      #     secrets: |
      #       secret/data/platform TERRAFORM_API_TOKEN | TF_VAR_TERRAFORM_API_TOKEN ;
      #       secret/data/platform KAMATERA_API_KEY | TF_VAR_KAMATERA_API_KEY ;
      #       secret/data/platform KAMATERA_API_SECRET | TF_VAR_KAMATERA_API_SECRET

      # ------------------------------------------------------------------
      # Secrets — GitHub Secrets (simplest)
      # ------------------------------------------------------------------
      # [github]
      # - name: Export Secrets
      #   run: |
      #     echo "TF_VAR_TERRAFORM_API_TOKEN=$${{ secrets.TERRAFORM_API_TOKEN }}" >> $GITHUB_ENV
      #     echo "TF_VAR_KAMATERA_API_KEY=$${{ secrets.KAMATERA_API_KEY }}" >> $GITHUB_ENV
      #     echo "TF_VAR_KAMATERA_API_SECRET=$${{ secrets.KAMATERA_API_SECRET }}" >> $GITHUB_ENV
      #     echo "TF_VAR_KAMATERA_PRIVATE_KEY=$${{ secrets.KAMATERA_PRIVATE_KEY }}" >> $GITHUB_ENV
      #     echo "TF_VAR_KAMATERA_PUBLIC_KEY=$${{ secrets.KAMATERA_PUBLIC_KEY }}" >> $GITHUB_ENV
      #     echo "TF_VAR_KAMATERA_ROOT_PASSWORD=$${{ secrets.KAMATERA_ROOT_PASSWORD }}" >> $GITHUB_ENV

      # ------------------------------------------------------------------
      # Validate
      # ------------------------------------------------------------------
      - name: Validate deployment file
        run: |
          strata validate $DEPLOYMENT_FILE --deep

      # ------------------------------------------------------------------
      # Build
      # ------------------------------------------------------------------
      - name: Build platform artifacts
        run: |
          strata build run --file $DEPLOYMENT_FILE

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: platform-build
          path: .strata/build/
          retention-days: 14

      # ------------------------------------------------------------------
      # Deploy
      # ------------------------------------------------------------------
      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: platform-build
          path: .strata/build/

      - name: Deploy infrastructure
        run: |
          ARGS="--file $DEPLOYMENT_FILE --force"
          if [ "$${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "$${{ inputs.stage }}" ]; then
            ARGS="$ARGS --stage $${{ inputs.stage }}"
          fi
          strata deploy run $ARGS
